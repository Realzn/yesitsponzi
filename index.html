<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YESITSPONZI</title>
  <meta name="description" content="Crée ta pyramide. Recrute. Le plus grand gagne tout le site.">
  <meta property="og:title" content="YESITSPONZI">
  <meta property="og:description" content="Oui c'est un ponzi. Le winner prend tout le site.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <!-- AWAKENING SCREEN -->
  <div id="awakening">
    <div id="eye-wrapper">
      <svg id="eye-svg" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer eye -->
        <path id="eye-outer" d="M10 60 Q100 5 190 60 Q100 115 10 60Z"
              fill="none" stroke="#C5A03F" stroke-width="1.5" opacity="0"/>
        <!-- Iris -->
        <circle id="eye-iris" cx="100" cy="60" r="22"
                fill="none" stroke="#00A3FF" stroke-width="1" opacity="0"/>
        <!-- Pupil -->
        <circle id="eye-pupil" cx="100" cy="60" r="8"
                fill="#00A3FF" opacity="0"/>
        <!-- Triangle above -->
        <polygon id="eye-triangle" points="100,2 120,45 80,45"
                 fill="none" stroke="#C5A03F" stroke-width="1" opacity="0"/>
        <!-- Rays -->
        <g id="eye-rays" opacity="0" stroke="#C5A03F" stroke-width=".6">
          <line x1="100" y1="60" x2="100" y2="20"/>
          <line x1="100" y1="60" x2="140" y2="38"/>
          <line x1="100" y1="60" x2="140" y2="82"/>
          <line x1="100" y1="60" x2="100" y2="100"/>
          <line x1="100" y1="60" x2="60" y2="82"/>
          <line x1="100" y1="60" x2="60" y2="38"/>
        </g>
      </svg>
      <div id="eye-glyph">𓂀</div>
    </div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>

  <script>
  // ── AWAKENING ANIMATION ──────────────────────────────────
  ;(function(){
    const aw = document.getElementById('awakening')
    const parts = {
      outer:    document.getElementById('eye-outer'),
      iris:     document.getElementById('eye-iris'),
      pupil:    document.getElementById('eye-pupil'),
      triangle: document.getElementById('eye-triangle'),
      rays:     document.getElementById('eye-rays'),
      glyph:    document.getElementById('eye-glyph'),
    }
    const fade = (el, from, to, dur, delay=0) => {
      setTimeout(() => {
        el.style.transition = `opacity ${dur}ms ease`
        el.style.opacity = to
      }, delay)
    }

    // Sequence
    fade(parts.outer,    0, 1, 600, 200)
    fade(parts.triangle, 0, 1, 500, 500)
    fade(parts.iris,     0, 1, 400, 800)
    fade(parts.rays,     0, .4, 400, 900)
    fade(parts.pupil,    0, 1, 300, 1100)
    fade(parts.glyph,    0, 1, 400, 1300)

    // Blink cyan
    setTimeout(() => {
      parts.pupil.setAttribute('fill', '#00A3FF')
      parts.iris.setAttribute('stroke', '#00A3FF')
      parts.iris.style.filter = 'drop-shadow(0 0 8px #00A3FF)'
      parts.pupil.style.filter = 'drop-shadow(0 0 12px #00A3FF)'
    }, 1600)

    // Second blink
    setTimeout(() => {
      parts.pupil.style.opacity = 0
      parts.iris.style.opacity  = 0
    }, 1900)
    setTimeout(() => {
      parts.pupil.style.opacity = 1
      parts.iris.style.opacity  = 1
    }, 2100)

    // Fade out + reveal app bottom-to-top
    setTimeout(() => {
      aw.style.transition = 'opacity 600ms ease'
      aw.style.opacity = 0
    }, 2500)
    setTimeout(() => {
      aw.style.display = 'none'
      document.getElementById('app').classList.add('illuminated')
    }, 3100)
  })()
  </script>
</body>
</html>
